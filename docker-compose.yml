services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: riskuser
      POSTGRES_PASSWORD: riskpass
      POSTGRES_DB: risktracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskuser -d risktracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://riskuser:riskpass@db:5432/risktracker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
